<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0f4c81;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 10px;
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 10px;
      border: none;
      cursor: pointer;
      width: 100%;
    }

    .report {
      border-left: 5px solid #0f4c81;
      background: #f9f9f9;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Crear Reporte</h1>

  <input id="title" placeholder="Título">
  <textarea id="desc" placeholder="Descripción"></textarea>

  <select id="priority">
    <option>Alta</option>
    <option selected>Media</option>
    <option>Baja</option>
  </select>

  <button onclick="addReport()">Enviar</button>
</div>

<div class="container">
  <h1>Reportes</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://report-system-ah71.onrender.com/reports";

let lastIds = new Set();

window.onload = () => {

  // 🔔 NOTIFICACIONES
  if ("Notification" in window) {
    Notification.requestPermission();
  }

  // 🔊 SONIDO
  let sound;
  document.addEventListener("click", () => {
    sound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
    sound.volume = 1.0;
  }, { once: true });

  function showAlert(text) {
    const alertBox = document.createElement("div");

    alertBox.innerHTML = "🚨 NUEVO REPORTE 🚨<br>" + text;

    alertBox.style.position = "fixed";
    alertBox.style.top = "20px";
    alertBox.style.right = "20px";
    alertBox.style.background = "red";
    alertBox.style.color = "white";
    alertBox.style.padding = "15px";
    alertBox.style.borderRadius = "10px";

    document.body.appendChild(alertBox);

    setTimeout(() => alertBox.remove(), 8000);
  }

  async function loadReports() {
    const res = await fetch(API);
    const data = await res.json();

    const list = document.getElementById("list");
    if (!list) return;

    list.innerHTML = "";

    data.reverse().forEach(r => {

      // ✅ ALERTA SOLO NUEVOS
      if (!lastIds.has(r.id)) {

        if (sound) sound.play().catch(() => {});
        if (Notification.permission === "granted") {
          new Notification("Nuevo reporte", { body: r.title });
        }

        showAlert(r.title);
      }

      lastIds.add(r.id);

      const div = document.createElement("div");
      div.className = "report";

      div.innerHTML = `
        <b>${r.title}</b> (${r.priority})<br>
        ${r.description}<br>
        <b>Estatus:</b> ${r.status}<br>
      `;

      list.appendChild(div);
    });
  }

  async function addReport() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("desc").value;
    const priority = document.getElementById("priority").value;

    if (!title || !description) return;

    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title,
        description,
        priority,
        assignedTo: "Procesos",
        status: "Pending",
        createdAt: new Date().toISOString()
      })
    });

    // limpiar inputs
    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
  }

  setInterval(loadReports, 2000);
  loadReports();
};
</script>

</body>
</html>
