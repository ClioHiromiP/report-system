<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(180deg, #e9f1fb 0%, #f7fafc 100%);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1f2937;
      display: flex;
      justify-content: center;
      padding: 28px 16px 48px;
    }

    .container {
      width: min(1080px, 100%);
      background: #ffffff;
      padding: 28px 30px;
      border-radius: 28px;
      box-shadow: 0 30px 80px rgba(15, 76, 129, 0.14);
      border: 1px solid rgba(15, 76, 129, 0.08);
    }

    .page-header {
      text-align: center;
      margin-bottom: 28px;
    }

    .page-header h1 {
      margin: 0;
      font-size: clamp(2rem, 2.6vw, 2.8rem);
      letter-spacing: -0.03em;
      color: #0f4c81;
    }

    .page-header h2 {
      margin: 0;
      font-size: 1.75rem;
      letter-spacing: -0.02em;
      color: #0f4c81;
    }

    .section-header {
      margin-top: 32px;
      margin-bottom: 18px;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 14px;
    }

    .container + .container {
      margin-top: 32px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      margin-bottom: 22px;
    }

    .form-grid > div {
      display: flex;
      flex-direction: column;
    }

    .form-grid > div.full-width {
      grid-column: 1 / -1;
    }

    label {
      font-weight: 700;
      margin-bottom: 10px;
      color: #334155;
    }

    input, textarea, select {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      color: #0f172a;
      box-shadow: inset 0 1px 2px rgba(15,23,42,0.08);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      font-size: 1rem;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #0f4c81;
      box-shadow: 0 0 0 4px rgba(15, 76, 129, 0.1);
      background: #ffffff;
    }

    .primary-btn, .action-btn {
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 16px 22px;
      background: #0f4c81;
      color: #ffffff;
      font-size: 1rem;
      box-shadow: 0 18px 36px rgba(15, 76, 129, 0.18);
    }

    .primary-btn:hover {
      background: #0b3a67;
      transform: translateY(-1px);
    }


    .report {
      border-left: 4px solid rgba(15, 76, 129, 0.85);
      background: #f8fafc;
      margin-top: 18px;
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 14px 30px rgba(15, 76, 129, 0.06);
    }

    .report b {
      color: #0f4c81;
    }

    .action-btn {
      width: 100%;
      padding: 14px 16px;
      margin-top: 12px;
      background: #1e3a8a;
      color: #ffffff;
      font-size: 0.95rem;
    }

    .action-btn:hover {
      background: #16316d;
      transform: translateY(-1px);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
      background: #ffffff;
      box-shadow: 0 20px 40px rgba(15, 76, 129, 0.08);
      border-radius: 22px;
      overflow: hidden;
    }

    th, td {
      padding: 18px 16px;
      text-align: left;
      border-bottom: 1px solid #e2e8f0;
    }

    th {
      background-color: #0f4c81;
      color: white;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-size: 0.85rem;
    }

    tbody tr:nth-child(even) {
      background-color: #f8fafc;
    }

    tbody tr:hover {
      background-color: #eef2ff;
    }

    .table-title {
      margin: 0;
      color: #0f4c81;
      font-size: 1.25rem;
      margin-top: 8px;
    }

    .small {
      font-size: 0.92rem;
      color: #64748b;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="page-header">
    <h1>Sistema de Reportes</h1>
    <p class="subtitle">Crea un nuevo reporte y revisa los existentes.</p>
  </div>

  <div class="form-grid">
    <div>
      <label>Tema</label>
      <input id="title" placeholder="Ingrese el título del reporte">
    </div>

    <div class="full-width">
      <label>Descripción</label>
      <textarea id="desc" placeholder="Describe el problema o situación"></textarea>
    </div>

    <div>
      <label>Importancia</label>
      <select id="priority">
        <option>Alta</option>
        <option selected>Media</option>
        <option>Baja</option>
      </select>
    </div>

    <div>
      <label>Asignado a</label>
      <select id="assignedTo">
        <option value="Procesos" selected>Procesos</option>
      </select>
    </div>
  </div>

  <button class="primary-btn" onclick="addReport()">Enviar Reporte</button>
</div>

<div class="container section-header">
    <h2 class="section-title">Reportes</h2>
    <div id="table-container"></div>
    <div id="list"></div>
  </div>
<script>
const API = "/reports";

function updateCsvLink() {
  const link = document.getElementById("downloadCsvLink");
  if (link) {
    link.href = "/reports.csv?ts=" + Date.now();
  }
}

let openedDays = JSON.parse(localStorage.getItem("openedDays")) || {};
let lastIds = new Set();
let notificationPermission = "default";

//  permisos
if ("Notification" in window) {
  Notification.requestPermission().then(permission => {
    notificationPermission = permission;
  });
}

// 🔊 sonido
let notifSound;
document.addEventListener("click", () => {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission().then(permission => {
      notificationPermission = permission;
    });
  }

  notifSound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
  notifSound.volume = 1.0;
}, { once: true });

// 🚨 alerta visual
function showAlert(text) {
  const alertBox = document.createElement("div");

  alertBox.innerHTML = "🚨 NUEVO REPORTE PARA PROCESOS 🚨<br>" + text;

  alertBox.style.position = "fixed";
  alertBox.style.top = "20px";
  alertBox.style.right = "20px";
  alertBox.style.background = "red";
  alertBox.style.color = "white";
  alertBox.style.padding = "15px";
  alertBox.style.borderRadius = "10px";
  alertBox.style.zIndex = "9999";

  document.body.appendChild(alertBox);

  setTimeout(() => alertBox.remove(), 8000);
}

// acciones
function askForAction(id, type) {
  const action = prompt("Describe qué se hizo o qué pasó");

  if (!action) return;

  updateReport(id, type, action);
}

async function updateReport(id, type, action) {
  let status = "Pending";

  if (type === "resolved") status = "Resolved";
  if (type === "not") status = "Not Resolved";
  if (type === "pending") status = "Pending";

  await fetch(API + "/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      status,
      resolvedAt: new Date().toISOString(),
      actionTaken: action
    })
  });

  loadReports();
}

// tiempo relativo
function timeAgo(date) {
  const diff = Math.floor((new Date() - new Date(date)) / 60000);

  if (diff < 1) return "Justo ahora";
  if (diff < 60) return diff + " min atrás";

  const h = Math.floor(diff / 60);
  if (h < 24) return h + " hr atrás";

  const d = Math.floor(h / 24);
  return d + " día(s)";
}

// tiempo de resolución
function resolutionTime(start, end) {
  if (!end) return "";

  const diff = Math.floor((new Date(end) - new Date(start)) / 60000);

  if (diff < 60) return diff + " min";
  return Math.floor(diff / 60) + " hr";
}
function renderReportsTable(reports) {
  const container = document.getElementById("table-container");
  if (!container) return;

  if (!Array.isArray(reports) || reports.length === 0) {
    container.innerHTML = "<p>No hay reportes para mostrar en tabla.</p>";
    return;
  }

  const rows = reports
    .map(r => `
      <tr>
        <td>${r.id || ""}</td>
        <td>${r.title || ""}</td>
        <td>${r.description || ""}</td>
        <td>${r.priority || ""}</td>
        <td>${r.assignedTo || ""}</td>
        <td>${r.status || ""}</td>
        <td>${new Date(r.createdAt).toLocaleString() || ""}</td>
        <td>${r.resolvedAt ? new Date(r.resolvedAt).toLocaleString() : ""}</td>
        <td>${r.actionTaken || ""}</td>
      </tr>
    `)
    .join("");

  container.innerHTML = `
    <h2>Reportes en tabla</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Tema</th>
          <th>Descripción</th>
          <th>Importancia</th>
          <th>Asignado a</th>
          <th>Estatus</th>
          <th>Creado</th>
          <th>Resuelto</th>
          <th>Acción tomada</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  `;
}
// cargar
async function loadReports() {
  const res = await fetch(API);
  let data = await res.json();

  if (!Array.isArray(data)) {
    data = [];
  }

  renderReportsTable(data);

  const list = document.getElementById("list");
  list.innerHTML = "";

  const grouped = {};

  data.forEach(r => {
    const date = new Date(r.createdAt).toLocaleDateString();
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(r);
  });

  Object.keys(grouped).reverse().forEach(date => {

    const section = document.createElement("div");

    section.innerHTML = `
      <h3 style="cursor:pointer;"> ${date}</h3>
      <div class="day-content"></div>
    `;

    const content = section.querySelector(".day-content");
    content.style.display = openedDays[date] ? "block" : "none";

    grouped[date].reverse().forEach(r => {

      if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

        if (notifSound) {
          notifSound.play().catch(() => {});
        }

        if (notificationPermission === "granted") {
          new Notification("Nuevo reporte", {
            body: r.title
          });
        }

        showAlert(r.title);
      }

      lastIds.add(r.id);

      const div = document.createElement("div");
      div.className = "report";

      div.innerHTML = `
        <b>${r.title}</b> (${r.priority})<br>
        ${r.description}<br>
        <b>Estatus:</b> ${r.status}<br>

        <div class="small">
           Creado: ${new Date(r.createdAt).toLocaleString()}<br>
          ⏱ ${timeAgo(r.createdAt)}<br>

          ${r.resolvedAt 
            ? ` Resuelto: ${new Date(r.resolvedAt).toLocaleString()}<br>` 
            : ""}

          ${r.resolvedAt 
            ? ` Tiempo resolución: ${resolutionTime(r.createdAt, r.resolvedAt)}<br>` 
            : ""}

          ${r.actionTaken ? `🔧 ${r.actionTaken}<br>` : ""}
        </div>

        <button class="action-btn" onclick="askForAction(${r.id}, 'resolved')">✅ Resuelto</button>
        <button class="action-btn" onclick="askForAction(${r.id}, 'not')">❌ No Resuelto</button>
        <button class="action-btn" onclick="askForAction(${r.id}, 'pending')">⏳ Pendiente</button>
      `;

      content.appendChild(div);
    });

    section.querySelector("h3").onclick = () => {
      const isOpen = content.style.display === "none";
      content.style.display = isOpen ? "block" : "none";
      openedDays[date] = isOpen;
      localStorage.setItem("openedDays", JSON.stringify(openedDays));
    };

    list.appendChild(section);
  });
}

// crear
async function addReport() {
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("desc").value.trim();
  const priority = document.getElementById("priority").value;
  const assignedTo = document.getElementById("assignedTo").value;

  if (!title || !description) {
    alert("Llena todos los campos");
    return;
  }

  try {
    const response = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title,
        description,
        priority,
        assignedTo,
        status: "Pending",
        createdAt: new Date().toISOString()
      })
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`Error al enviar reporte: ${response.status} ${errorText}`);
    }

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("priority").selectedIndex = 1;
    document.getElementById("assignedTo").selectedIndex = 0;

    loadReports();
  } catch (error) {
    console.error(error);
    alert(`No se pudo enviar el reporte. Revisa la consola y asegúrate de abrir el app desde el servidor.`);
  }
}

window.onload = () => {
  loadReports();
  updateCsvLink();
  setInterval(() => {
    loadReports();
    updateCsvLink();
  }, 2000);
};
</script>

</body>
</html>
