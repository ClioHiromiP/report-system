<script>
const API = "https://report-system-ah71.onrender.com/reports";

let lastIds = new Set();

// 🔔 pedir permiso de notificaciones
if ("Notification" in window) {
  Notification.requestPermission();
}

// 🔊 activar sonido después de un click
let sound;
document.body.addEventListener("click", () => {
  sound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  sound.volume = 1.0;
}, { once: true });

// 🚨 crear alerta visual
function showAlert(text) {
  const alertBox = document.createElement("div");

  alertBox.innerHTML = "🚨 NUEVO REPORTE PARA PROCESOS 🚨<br>" + text;

  alertBox.style.position = "fixed";
  alertBox.style.top = "20px";
  alertBox.style.right = "20px";
  alertBox.style.background = "red";
  alertBox.style.color = "white";
  alertBox.style.padding = "15px";
  alertBox.style.fontSize = "18px";
  alertBox.style.borderRadius = "10px";
  alertBox.style.zIndex = "9999";

  document.body.appendChild(alertBox);

  setTimeout(() => {
    alertBox.remove();
  }, 10000);
}

function timeAgo(date) {
  const now = new Date();
  const past = new Date(date);
  const diff = Math.floor((now - past) / 60000);

  if (diff < 1) return "Justo ahora";
  if (diff < 60) return diff + " min";

  const hours = Math.floor(diff / 60);
  if (hours < 24) return hours + " hr";

  const days = Math.floor(hours / 24);
  return days + " día(s)";
}

function resolutionTime(created, resolved) {
  if (!resolved) return "";

  const diff = Math.floor((new Date(resolved) - new Date(created)) / 60000);

  if (diff < 1) return "Resuelto inmediatamente";
  if (diff < 60) return "Resuelto en " + diff + " min";

  const hours = Math.floor(diff / 60);
  return "Resuelto en " + hours + " hr";
}

async function loadReports() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(r => {

    // ✅ detectar reporte nuevo solo PROCESOS
    if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

      // 🔔 sonido
      if (sound) sound.play();

      // 🪟 notificación sistema
      if (Notification.permission === "granted") {
        new Notification("Nuevo reporte", {
          body: r.title
        });
      }

      // 🚨 alerta visual GRANDE
      showAlert(r.title);
    }

    lastIds.add(r.id);

    const div = document.createElement("div");
    div.className = "report";

    div.innerHTML = `
      <b>${r.title}</b> (${r.priority})<br>
      ${r.description}<br>
      <b>Asignado:</b> ${r.assignedTo}<br>
      <b>Estatus:</b> ${r.status}<br>

      <div class="small">
        Creado: ${new Date(r.createdAt).toLocaleString()}<br>
        ⏱ Creado hace ${timeAgo(r.createdAt)}<br>

        ${r.resolvedAt 
          ? `Resuelto: ${new Date(r.resolvedAt).toLocaleString()}<br>` 
          : ""
        }

        ${r.resolvedAt 
          ? `✅ ${resolutionTime(r.createdAt, r.resolvedAt)}`
          : ""
        }
      </div>

      ${r.status === "Pending"
        ? `<button onclick="resolve(${r.id})">Marcar como Resuelto</button>`
        : ""
      }
    `;

    list.appendChild(div);
  });
}

async function addReport() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("desc").value;
  const priority = document.getElementById("priority").value;
  const assignedTo = document.getElementById("team").value;

  if (!title || !description) return;

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      description,
      priority,
      assignedTo,
      status: "Pending",
      createdAt: new Date().toISOString()
    })
  });

  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";
}

async function resolve(id) {
  await fetch(API + "/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "Resolved",
      resolvedAt: new Date().toISOString()
    })
  });
}

// ⚡ actualización rápida
setInterval(loadReports, 2000);

loadReports();
</script>
