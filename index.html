<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 8px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Activar Notificaciones</h1>
  <button onclick="enableNotifications()">🔔 Activar alertas</button>
</div>

<div class="container">
  <h1>Reportes</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://report-system-ah71.onrender.com/reports";

let lastIds = new Set();
let firstLoad = true;

let notifSound;

// ✅ ACTIVAR TODO MANUALMENTE
function enableNotifications() {

  // pedir permiso
  Notification.requestPermission().then(permission => {
    if (permission === "granted") {
      alert("Notificaciones activadas ✅");
    } else {
      alert("Necesitas permitir notificaciones ❌");
    }
  });

  // activar sonido (esto SOLO funciona después de click)
  notifSound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
  notifSound.volume = 1.0;
}

// ✅ ALERTA VISUAL
function showAlert(text) {
  const div = document.createElement("div");

  div.innerHTML = "🚨 NUEVO REPORTE 🚨<br>" + text;

  div.style.position = "fixed";
  div.style.top = "20px";
  div.style.right = "20px";
  div.style.background = "red";
  div.style.color = "white";
  div.style.padding = "15px";
  div.style.borderRadius = "10px";

  document.body.appendChild(div);

  setTimeout(() => div.remove(), 5000);
}

// ✅ CARGAR REPORTES
async function loadReports() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(r => {

    // ✅ DETECTAR NUEVOS
    if (!lastIds.has(r.id) && !firstLoad) {

      // 🔊 sonido
      if (notifSound) {
        notifSound.play().catch(() => {});
      }

      // 🪟 notificación sistema
      if (Notification.permission === "granted") {
        new Notification("Nuevo reporte", {
          body: r.title
        });
      }

      // 🚨 alerta visual
      showAlert(r.title);
    }

    lastIds.add(r.id);

    const div = document.createElement("div");
    div.innerHTML = r.title;

    list.appendChild(div);
  });
  firstLoad = false;

}

setInterval(loadReports, 2000);
</script>

</body>
</html>
