<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0f4c81;
      text-align: center;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #08365d;
    }

    .report {
      border-left: 5px solid #0f4c81;
      background: #f9f9f9;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Crear Reporte</h1>

  <label>Tema</label>
  <input id="title">

  <label>Descripción</label>
  <textarea id="desc"></textarea>

  <label>Importancia</label>
  <select id="priority">
    <option>Alta</option>
    <option selected>Media</option>
    <option>Baja</option>
  </select>

  <button onclick="addReport()">Enviar Reporte</button>
</div>

<div class="container">
  <h1>Reportes</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://report-system-ah71.onrender.com/reports";

window.onload = () => {
  loadReports();
  setInterval(loadReports, 2000);
};

async function resolveReport(id) {
  await fetch(API + "/" + id, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      status: "Resolved",
      resolvedAt: new Date().toISOString()
    })
  });

  loadReports();
}
``

// 🔔 VARIABLES DE CONTROL
let lastIds = new Set();

// 🔊 SONIDO (se activa después de un click)
let notifSound;
document.addEventListener("click", () => {
  notifSound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
  notifSound.volume = 1.0;
}, { once: true });

// 🪟 PEDIR PERMISO DE NOTIFICACIONES
if ("Notification" in window) {
  Notification.requestPermission();
}

// 🚨 ALERTA VISUAL
function showAlert(text) {
  const alertBox = document.createElement("div");

  alertBox.innerHTML = "🚨 NUEVO REPORTE PARA PROCESOS 🚨<br>" + text;

  alertBox.style.position = "fixed";
  alertBox.style.top = "20px";
  alertBox.style.right = "20px";
  alertBox.style.background = "red";
  alertBox.style.color = "white";
  alertBox.style.padding = "15px";
  alertBox.style.fontSize = "16px";
  alertBox.style.borderRadius = "10px";
  alertBox.style.zIndex = "9999";

  document.body.appendChild(alertBox);

  setTimeout(() => {
    alertBox.remove();
  }, 8000);
}

async function loadReports() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  if (!list) return;

  list.innerHTML = "";

  data.reverse().forEach(r => {
    // ✅ DETECTAR NUEVOS REPORTES SOLO PARA PROCESOS
if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

  // 🔔 sonido
  if (notifSound) {
    notifSound.play().catch(() => {});
  }

  // 🪟 notificación del sistema
  if (Notification.permission === "granted") {
    new Notification("Nuevo reporte para Procesos", {
      body: r.title
    });
  }

  // 🚨 alerta visual
  showAlert(r.title);
}

lastIds.add(r.id);

    const div = document.createElement("div");
    div.className = "report";

    div.innerHTML = `
      <b>${r.title}</b> (${r.priority})<br>
      ${r.description}<br>
      <b>Asignado a:</b> ${r.assignedTo}<br>
      <b>Estatus:</b> ${r.status}<br>
      <div class="small">
        ${new Date(r.createdAt).toLocaleString()}
      </div>
    `;

    list.appendChild(div);
  });
}

async function addReport() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("desc").value;
  const priority = document.getElementById("priority").value;

  if (!title || !description) {
    alert("Llena todos los campos");
    return;
  }

  await fetch(API, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      title,
      description,
      priority,
      assignedTo: "Procesos",
      status: "Pending",
      createdAt: new Date().toISOString()
    })
  });

  // limpiar campos
  document.getElementById("title").value = "";
  document.getElementById("desc").value = "";

  // actualizar lista
  loadReports();
}
</script>

</body>
</html>
