<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0f4c81;
      text-align: center;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 8px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    .report {
      border-left: 5px solid #0f4c81;
      background: #f9f9f9;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Crear Reporte</h1>

  <input id="title" placeholder="Tema">
  <textarea id="desc" placeholder="Descripción"></textarea>

  <select id="priority">
    <option>Alta</option>
    <option selected>Media</option>
    <option>Baja</option>
  </select>

  <select id="assignedTo">
    <option value="Procesos" selected>Procesos</option>
  </select>

  <button onclick="addReport()">Enviar Reporte</button>
</div>

<div class="container">
  <h1>Reportes</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://report-system-ah71.onrender.com/reports";

let lastIds = new Set();

// ✅ pedir permiso una sola vez
if ("Notification" in window) {
  Notification.requestPermission();
}

// ✅ activar sonido después de cualquier click
let notifSound;
document.addEventListener("click", () => {
  notifSound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
  notifSound.volume = 1.0;
}, { once: true });

// 🚨 alerta visual
function showAlert(text) {
  const div = document.createElement("div");

  div.innerHTML = "🚨 NUEVO REPORTE 🚨<br>" + text;

  div.style.position = "fixed";
  div.style.top = "20px";
  div.style.right = "20px";
  div.style.background = "red";
  div.style.color = "white";
  div.style.padding = "15px";
  div.style.borderRadius = "10px";

  document.body.appendChild(div);

  setTimeout(() => div.remove(), 5000);
}

// ✅ cargar reportes
async function loadReports() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(r => {

    // 🔔 detectar nuevos (como antes)
    if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

      if (notifSound) notifSound.play().catch(() => {});

      if (Notification.permission === "granted") {
        new Notification("Nuevo reporte", {
          body: r.title
        });
      }

      showAlert(r.title);
    }

    lastIds.add(r.id);

    const div = document.createElement("div");
    div.className = "report";

    div.innerHTML = `
      <b>${r.title}</b><br>
      ${r.description}
    `;

    list.appendChild(div);
  });
}

setInterval(loadReports, 2000);

// ✅ crear reporte
async function addReport() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("desc").value;
  const priority = document.getElementById("priority").value;
  const assignedTo = document.getElementById("assignedTo").value;

  if (!title || !description) {
    alert("Llena todos los campos");
    return;
  }

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      description,
      priority,
      assignedTo,
      status: "Pending",
      createdAt: new Date().toISOString()
    })
  });

  loadReports();
}
</script>

</body>
</html>
``
