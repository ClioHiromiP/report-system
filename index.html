<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
    }

    h1 {
      color: #0f4c81;
      text-align: center;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    button:hover {
      background-color: #08365d;
    }

    .report {
      border: 1px solid #ddd;
      border-left: 5px solid #0f4c81;
      padding: 10px;
      margin-top: 10px;
      border-radius: 6px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Crear Reporte</h1>

    <label>Título</label>
    <input id="title">

    <label>Descripción</label>
    <textarea id="desc"></textarea>

    <label>Prioridad</label>
    <select id="priority">
      <option>Alta</option>
      <option selected>Media</option>
      <option>Baja</option>
    </select>

    <label>Asignado a</label>
    <select id="team">
      <option>Procesos</option>
    </select>

    <button onclick="addReport()">Enviar Reporte</button>
  </div>

  <div class="container">
    <h1>Reportes</h1>
    <div id="list"></div>
  </div>

<script>
  const API = "https://report-system-ah71.onrender.com/reports";

  let lastIds = new Set();

  // 🔔 solicitar permisos de notificaciones
  if ("Notification" in window) {
    Notification.requestPermission();
  }

  // 🔊 sonido fuerte
  const sound = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");
  sound.volume = 1.0;

  function timeAgo(date) {
    const now = new Date();
    const past = new Date(date);
    const diff = Math.floor((now - past) / 60000);

    if (diff < 1) return "Justo ahora";
    if (diff < 60) return diff + " min";

    const hours = Math.floor(diff / 60);
    if (hours < 24) return hours + " hr";

    const days = Math.floor(hours / 24);
    return days + " día(s)";
  }

  function resolutionTime(created, resolved) {
    if (!resolved) return "";

    const diff = Math.floor((new Date(resolved) - new Date(created)) / 60000);

    if (diff < 1) return "Resuelto inmediatamente";
    if (diff < 60) return "Resuelto en " + diff + " min";

    const hours = Math.floor(diff / 60);
    return "Resuelto en " + hours + " hr";
  }

  async function loadReports() {
    const res = await fetch(API);
    const data = await res.json();

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.reverse().forEach(r => {

      // ✅ NOTIFICACIÓN SOLO PARA PROCESOS Y SOLO NUEVOS
      if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

        // 🔔 sonido
        sound.play().catch(() => {});

        // 🪟 popup
        if (Notification.permission === "granted") {
          new Notification("Nuevo reporte para Procesos", {
            body: r.title
          });
        }
      }

      lastIds.add(r.id);

      const div = document.createElement("div");
      div.className = "report";

      div.innerHTML = `
        <b>${r.title}</b> (${r.priority})<br>
        ${r.description}<br>
        <b>Asignado:</b> ${r.assignedTo}<br>
        <b>Estatus:</b> ${r.status}<br>

        <div class="small">
          Creado: ${new Date(r.createdAt).toLocaleString()}<br>
          ⏱ Creado hace ${timeAgo(r.createdAt)}<br>

          ${r.resolvedAt 
            ? `Resuelto: ${new Date(r.resolvedAt).toLocaleString()}<br>` 
            : ""
          }

          ${r.resolvedAt 
            ? `✅ ${resolutionTime(r.createdAt, r.resolvedAt)}` 
            : ""
          }
        </div>

        ${r.status === "Pending"
          ? `<button onclick="resolve(${r.id})">Marcar como Resuelto</button>`
          : ""
        }
      `;

      list.appendChild(div);
    });
  }

  async function addReport() {
    const title = document.getElementById("title").value;
    const description = document.getElementById("desc").value;
    const priority = document.getElementById("priority").value;
    const assignedTo = document.getElementById("team").value;

    if (!title || !description) return;

    await fetch(API, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title,
        description,
        priority,
        assignedTo,
        status: "Pending",
        createdAt: new Date().toISOString()
      })
    });

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
  }

  async function resolve(id) {
    await fetch(API + "/" + id, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        status: "Resolved",
        resolvedAt: new Date().toISOString()
      })
    });
  }

  // ⚡ actualización cada 2 segundos
  setInterval(loadReports, 2000);

  loadReports();
</script>

</body>
</html>
