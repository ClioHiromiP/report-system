<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0f4c81;
      text-align: center;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    input, textarea, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 8px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    .download-link {
      display: inline-block;
      margin-bottom: 10px;
      padding: 8px 12px;
      background-color: #0f4c81;
      color: white;
      text-decoration: none;
      border-radius: 5px;
    }

    .download-link:hover {
      background-color: #0b3a67;
    }

    .report {
      border-left: 5px solid #0f4c81;
      background: #f9f9f9;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }

    th {
      background-color: #0f4c81;
      color: white;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Crear Reporte</h1>

  <label>Tema</label>
  <input id="title">

  <label>Descripción</label>
  <textarea id="desc"></textarea>

  <label>Importancia</label>
  <select id="priority">
    <option>Alta</option>
    <option selected>Media</option>
    <option>Baja</option>
  </select>

  <label>Asignado a</label>
  <select id="assignedTo">
    <option value="Procesos" selected>Procesos</option>
  </select>

  <button onclick="addReport()">Enviar Reporte</button>
</div>

<div class="container">
  <h1>Reportes</h1>
  <p><a id="downloadCsvLink" class="download-link" href="/reports.csv" download="reportes.csv">Descargar Excel (.csv)</a></p>
  <div id="list"></div>
  <div id="table-container"></div>
</div>

<script>
const API = "/reports";

function updateCsvLink() {
  const link = document.getElementById("downloadCsvLink");
  if (link) {
    link.href = "/reports.csv?ts=" + Date.now();
  }
}

let openedDays = JSON.parse(localStorage.getItem("openedDays")) || {};
let lastIds = new Set();
let notificationPermission = "default";

//  permisos
if ("Notification" in window) {
  Notification.requestPermission().then(permission => {
    notificationPermission = permission;
  });
}

// 🔊 sonido
let notifSound;
document.addEventListener("click", () => {
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission().then(permission => {
      notificationPermission = permission;
    });
  }

  notifSound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
  notifSound.volume = 1.0;
}, { once: true });

// 🚨 alerta visual
function showAlert(text) {
  const alertBox = document.createElement("div");

  alertBox.innerHTML = "🚨 NUEVO REPORTE PARA PROCESOS 🚨<br>" + text;

  alertBox.style.position = "fixed";
  alertBox.style.top = "20px";
  alertBox.style.right = "20px";
  alertBox.style.background = "red";
  alertBox.style.color = "white";
  alertBox.style.padding = "15px";
  alertBox.style.borderRadius = "10px";
  alertBox.style.zIndex = "9999";

  document.body.appendChild(alertBox);

  setTimeout(() => alertBox.remove(), 8000);
}

// acciones
function askForAction(id, type) {
  const action = prompt("Describe qué se hizo o qué pasó");

  if (!action) return;

  updateReport(id, type, action);
}

async function updateReport(id, type, action) {
  let status = "Pending";

  if (type === "resolved") status = "Resolved";
  if (type === "not") status = "Not Resolved";
  if (type === "pending") status = "Pending";

  await fetch(API + "/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      status,
      resolvedAt: new Date().toISOString(),
      actionTaken: action
    })
  });

  loadReports();
}

// tiempo relativo
function timeAgo(date) {
  const diff = Math.floor((new Date() - new Date(date)) / 60000);

  if (diff < 1) return "Justo ahora";
  if (diff < 60) return diff + " min atrás";

  const h = Math.floor(diff / 60);
  if (h < 24) return h + " hr atrás";

  const d = Math.floor(h / 24);
  return d + " día(s)";
}

// tiempo de resolución
function resolutionTime(start, end) {
  if (!end) return "";

  const diff = Math.floor((new Date(end) - new Date(start)) / 60000);

  if (diff < 60) return diff + " min";
  return Math.floor(diff / 60) + " hr";
}
function renderReportsTable(reports) {
  const container = document.getElementById("table-container");
  if (!container) return;

  if (!Array.isArray(reports) || reports.length === 0) {
    container.innerHTML = "<p>No hay reportes para mostrar en tabla.</p>";
    return;
  }

  const rows = reports
    .map(r => `
      <tr>
        <td>${r.id || ""}</td>
        <td>${r.title || ""}</td>
        <td>${r.description || ""}</td>
        <td>${r.priority || ""}</td>
        <td>${r.assignedTo || ""}</td>
        <td>${r.status || ""}</td>
        <td>${new Date(r.createdAt).toLocaleString() || ""}</td>
        <td>${r.resolvedAt ? new Date(r.resolvedAt).toLocaleString() : ""}</td>
        <td>${r.actionTaken || ""}</td>
      </tr>
    `)
    .join("");

  container.innerHTML = `
    <h2>Reportes en tabla</h2>
    <table>
      <thead>
        <tr>
          <th>ID</th>
          <th>Tema</th>
          <th>Descripción</th>
          <th>Importancia</th>
          <th>Asignado a</th>
          <th>Estatus</th>
          <th>Creado</th>
          <th>Resuelto</th>
          <th>Acción tomada</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
      </tbody>
    </table>
  `;
}
// cargar
async function loadReports() {
  const res = await fetch(API);
  let data = await res.json();

  if (!Array.isArray(data)) {
    data = [];
  }

  renderReportsTable(data);

  const list = document.getElementById("list");
  list.innerHTML = "";

  const grouped = {};

  data.forEach(r => {
    const date = new Date(r.createdAt).toLocaleDateString();
    if (!grouped[date]) grouped[date] = [];
    grouped[date].push(r);
  });

  Object.keys(grouped).reverse().forEach(date => {

    const section = document.createElement("div");

    section.innerHTML = `
      <h3 style="cursor:pointer;"> ${date}</h3>
      <div class="day-content"></div>
    `;

    const content = section.querySelector(".day-content");
    content.style.display = openedDays[date] ? "block" : "none";

    grouped[date].reverse().forEach(r => {

      if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

        if (notifSound) {
          notifSound.play().catch(() => {});
        }

        if (notificationPermission === "granted") {
          new Notification("Nuevo reporte", {
            body: r.title
          });
        }

        showAlert(r.title);
      }

      lastIds.add(r.id);

      const div = document.createElement("div");
      div.className = "report";

      div.innerHTML = `
        <b>${r.title}</b> (${r.priority})<br>
        ${r.description}<br>
        <b>Estatus:</b> ${r.status}<br>

        <div class="small">
           Creado: ${new Date(r.createdAt).toLocaleString()}<br>
          ⏱ ${timeAgo(r.createdAt)}<br>

          ${r.resolvedAt 
            ? ` Resuelto: ${new Date(r.resolvedAt).toLocaleString()}<br>` 
            : ""}

          ${r.resolvedAt 
            ? ` Tiempo resolución: ${resolutionTime(r.createdAt, r.resolvedAt)}<br>` 
            : ""}

          ${r.actionTaken ? `🔧 ${r.actionTaken}<br>` : ""}
        </div>

        <button onclick="askForAction(${r.id}, 'resolved')">✅ Resuelto</button>
        <button onclick="askForAction(${r.id}, 'not')">❌ No Resuelto</button>
        <button onclick="askForAction(${r.id}, 'pending')">⏳ Pendiente</button>
      `;

      content.appendChild(div);
    });

    section.querySelector("h3").onclick = () => {
      const isOpen = content.style.display === "none";
      content.style.display = isOpen ? "block" : "none";
      openedDays[date] = isOpen;
      localStorage.setItem("openedDays", JSON.stringify(openedDays));
    };

    list.appendChild(section);
  });
}

// crear
async function addReport() {
  const title = document.getElementById("title").value.trim();
  const description = document.getElementById("desc").value.trim();
  const priority = document.getElementById("priority").value;
  const assignedTo = document.getElementById("assignedTo").value;

  if (!title || !description) {
    alert("Llena todos los campos");
    return;
  }

  try {
    const response = await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title,
        description,
        priority,
        assignedTo,
        status: "Pending",
        createdAt: new Date().toISOString()
      })
    });

    if (!response.ok) {
      const errorText = await response.text();
      throw new Error(`Error al enviar reporte: ${response.status} ${errorText}`);
    }

    document.getElementById("title").value = "";
    document.getElementById("desc").value = "";
    document.getElementById("priority").selectedIndex = 1;
    document.getElementById("assignedTo").selectedIndex = 0;

    loadReports();
  } catch (error) {
    console.error(error);
    alert(`No se pudo enviar el reporte. Revisa la consola y asegúrate de abrir el app desde el servidor.`);
  }
}

window.onload = () => {
  loadReports();
  updateCsvLink();
  setInterval(() => {
    loadReports();
    updateCsvLink();
  }, 2000);
};
</script>

</body>
</html>
