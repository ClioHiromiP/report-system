<!DOCTYPE html>
<html>
<head>
  <title>Sistema de Reportes</title>

  <style>
    body {
      font-family: Arial;
      background-color: #f4f8fc;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: #0f4c81;
      text-align: center;
    }

    .container {
      width: 500px;
      background: white;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
      box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
    }

    button {
      background-color: #0f4c81;
      color: white;
      padding: 8px;
      margin-top: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      width: 100%;
    }

    .report {
      border-left: 5px solid #0f4c81;
      background: #f9f9f9;
      margin-top: 10px;
      padding: 10px;
      border-radius: 5px;
    }

    .small {
      font-size: 12px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Crear Reporte</h1>

  <input id="title" placeholder="Tema">
  <textarea id="desc" placeholder="Descripción"></textarea>

  <select id="priority">
    <option>Alta</option>
    <option selected>Media</option>
    <option>Baja</option>
  </select>

  <select id="assignedTo">
    <option value="Procesos" selected>Procesos</option>
  </select>

  <button onclick="addReport()">Enviar Reporte</button>
</div>

<div class="container">
  <h1>Reportes</h1>
  <div id="list"></div>
</div>

<script>
const API = "https://report-system-ah71.onrender.com/reports";

let openedDays = JSON.parse(localStorage.getItem("openedDays")) || {};
let lastIds = new Set();

// 🔔 NOTIFICACIONES COMO TENÍAS
if ("Notification" in window) {
  Notification.requestPermission();
}

// 🔊 SONIDO COMO TENÍAS
let notifSound;
document.addEventListener("click", () => {
  notifSound = new Audio("https://www.myinstants.com/media/sounds/bell.mp3");
  notifSound.volume = 1.0;
}, { once: true });

// 🚨 ALERTA VISUAL COMO TENÍAS
function showAlert(text) {
  const alertBox = document.createElement("div");

  alertBox.innerHTML = "🚨 NUEVO REPORTE PARA PROCESOS 🚨<br>" + text;

  alertBox.style.position = "fixed";
  alertBox.style.top = "20px";
  alertBox.style.right = "20px";
  alertBox.style.background = "red";
  alertBox.style.color = "white";
  alertBox.style.padding = "15px";
  alertBox.style.borderRadius = "10px";
  alertBox.style.zIndex = "9999";

  document.body.appendChild(alertBox);

  setTimeout(() => alertBox.remove(), 8000);
}

window.onload = () => {
  loadReports();
  setInterval(loadReports, 2000);
};

function askForAction(id, type) {
  const action = prompt("Describe qué se hizo, cambió o por qué sigue pendiente");

  if (!action) {
    alert("Debes escribir qué pasó");
    return;
  }

  updateReport(id, type, action);
}

async function updateReport(id, type, action) {
  let status = "Pending";

  if (type === "resolved") status = "Resolved";
  if (type === "not") status = "Not Resolved";
  if (type === "pending") status = "Pending";

  await fetch(API + "/" + id, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      status,
      resolvedAt: new Date().toISOString(),
      actionTaken: action
    })
  });

  loadReports();
}

async function loadReports() {
  const res = await fetch(API);
  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(r => {

    // ✅ TU LÓGICA ORIGINAL RESTAURADA
    if (!lastIds.has(r.id) && r.assignedTo === "Procesos") {

      if (notifSound) {
        notifSound.play().catch(() => {});
      }

      if (Notification.permission === "granted") {
        new Notification("Nuevo reporte para Procesos", {
          body: r.title
        });
      }

      showAlert(r.title);
    }

    lastIds.add(r.id);

    const div = document.createElement("div");
    div.className = "report";

    div.innerHTML = `
      <b>${r.title}</b><br>
      ${r.description}
    `;

    list.appendChild(div);
  });
}

async function addReport() {
  const title = document.getElementById("title").value;
  const description = document.getElementById("desc").value;
  const priority = document.getElementById("priority").value;
  const assignedTo = document.getElementById("assignedTo").value;

  if (!title || !description) {
    alert("Llena todos los campos");
    return;
  }

  await fetch(API, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      title,
      description,
      priority,
      assignedTo,
      status: "Pending",
      createdAt: new Date().toISOString()
    })
  });

  loadReports();
}
</script>

</body>
</html>
